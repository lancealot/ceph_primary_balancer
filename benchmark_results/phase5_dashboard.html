<!DOCTYPE html>
<html>
<head>
  <meta charset='utf-8'>
  <title>Benchmark Results Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
    .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; }
    h1 { color: #333; border-bottom: 3px solid #007bff; padding-bottom: 10px; }
    h2 { color: #555; margin-top: 30px; border-bottom: 2px solid #ddd; padding-bottom: 5px; }
    .metric-card { background: #f9f9f9; border-left: 4px solid #007bff; padding: 15px; margin: 10px 0; }
    .metric-card h3 { margin-top: 0; color: #007bff; }
    table { border-collapse: collapse; width: 100%; margin: 15px 0; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #007bff; color: white; }
    tr:nth-child(even) { background: #f9f9f9; }
    .good { color: #28a745; font-weight: bold; }
    .warn { color: #ffc107; font-weight: bold; }
    .bad { color: #dc3545; font-weight: bold; }
  </style>
</head>
<body>
  <div class='container'>
    <h1>📊 Benchmark Results Dashboard</h1>
    <h2>Performance Benchmarks</h2>
    <table>
      <tr><th>Scenario</th><th>Time (s)</th><th>Memory (MB)</th><th>Swaps</th><th>Throughput</th></tr>
      <tr>
        <td>tiny_smoke</td>
        <td>0.014</td>
        <td>0.1</td>
        <td>3</td>
        <td>213.5/s</td>
      </tr>
      <tr>
        <td>small_quick</td>
        <td>4.185</td>
        <td>0.8</td>
        <td>46</td>
        <td>11.0/s</td>
      </tr>
    </table>
    <h2>Quality Benchmarks</h2>
    <div class='metric-card'>
      <h3>replicated_3_moderate</h3>
      <p><strong>OSD CV:</strong> 23.19% → 10.02% (<span class='good'>+56.8%</span>)</p>
      <p><strong>Balance Score:</strong> 99.9/100</p>
      <p><strong>Swaps Applied:</strong> 51</p>
    </div>
  </div>
</body>
</html>
